name: Build Relay release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish self-contained Relay
        run: dotnet publish ESOSyncClient.csproj --configuration Release --runtime win-x64 --self-contained true --output publish

      - name: Create release archive
        shell: pwsh
        run: |
          Copy-Item publish/RedfurSync.exe RedfurSync.exe
          Compress-Archive -Path publish/RedfurSync.exe -DestinationPath RedfurSync-win-x64.zip

      - name: Create update manifest
        shell: pwsh
        run: |
          $exe = Get-Item publish/RedfurSync.exe
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $manifest = [ordered]@{
            version = $version
            downloadUrl = "https://github.com/EchoTiger/ESOSyncClient/releases/download/$($env:GITHUB_REF_NAME)/RedfurSync.exe"
            changelog = "Fissal Relay $version"
            sizeBytes = [int64]$exe.Length
            sha256 = $hash
          }
          $manifest | ConvertTo-Json | Set-Content -Path update-manifest.json -Encoding utf8

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            RedfurSync.exe
            RedfurSync-win-x64.zip
            update-manifest.json