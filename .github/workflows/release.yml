name: Build Relay release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish self-contained Relay
        run: dotnet publish ESOSyncClient.csproj --configuration Release --runtime win-x64 --self-contained true --output publish

      - name: Create release archive
        shell: pwsh
        run: Compress-Archive -Path publish/RedfurSync.exe -DestinationPath RedfurSync-win-x64.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: RedfurSync-win-x64.zip