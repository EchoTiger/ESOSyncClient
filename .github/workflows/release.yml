name: Build Relay release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve build version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content ESOSyncClient.csproj
          $projectVersion = [string]$project.Project.PropertyGroup.Version
          $isRelease = $env:GITHUB_REF_TYPE -eq 'tag'
          if ($isRelease) {
            if ($env:GITHUB_REF_NAME -notmatch '^v(?<Version>\d+\.\d+\.\d+)$') {
              throw "Release tag must use vMAJOR.MINOR.PATCH. Received: $env:GITHUB_REF_NAME"
            }
            if ($projectVersion -ne $Matches.Version) {
              throw "Tag version $($Matches.Version) does not match ESOSyncClient.csproj version $projectVersion."
            }
          }
          "RELEASE_VERSION=$projectVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version=$projectVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "is_release=$($isRelease.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Record build toolchain
        shell: pwsh
        run: |
          $sdkVersion = dotnet --version
          if ($sdkVersion -ne '10.0.100') {
            throw "Expected .NET SDK 10.0.100, found $sdkVersion."
          }
          "RELEASE_SDK=$sdkVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore Relay
        run: dotnet restore ESOSyncClient.csproj --runtime win-x64

      - name: Publish self-contained Relay
        run: >-
          dotnet publish ESOSyncClient.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          --output publish
          -p:Version=${{ steps.version.outputs.version }}
          -p:ContinuousIntegrationBuild=true
          -p:Deterministic=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Create release archive
        shell: pwsh
        run: |
          Copy-Item publish/RedfurSync.exe RedfurSync.exe
          Compress-Archive -Path publish/RedfurSync.exe -DestinationPath RedfurSync-win-x64.zip

      - name: Create update manifest
        shell: pwsh
        run: |
          $exe = Get-Item publish/RedfurSync.exe
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $releaseTag = "v$($env:RELEASE_VERSION)"
          $manifest = [ordered]@{
            version = $env:RELEASE_VERSION
            downloadUrl = "https://github.com/EchoTiger/ESOSyncClient/releases/download/$releaseTag/RedfurSync.exe"
            changelog = "Fissal Relay $($env:RELEASE_VERSION)"
            sizeBytes = [int64]$exe.Length
            sha256 = $hash
          }
          $manifest | ConvertTo-Json | Set-Content -Path update-manifest.json -Encoding utf8

      - name: Verify release artifacts
        shell: pwsh
        run: |
          $exe = Get-Item RedfurSync.exe
          $exeHash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $manifest = Get-Content update-manifest.json -Raw | ConvertFrom-Json
          $expectedUrl = "https://github.com/EchoTiger/ESOSyncClient/releases/download/v$($env:RELEASE_VERSION)/RedfurSync.exe"
          if ($manifest.version -ne $env:RELEASE_VERSION) { throw 'Manifest version does not match the release version.' }
          if ($manifest.downloadUrl -ne $expectedUrl) { throw 'Manifest downloadUrl does not reference the tagged executable.' }
          if ([int64]$manifest.sizeBytes -ne $exe.Length) { throw 'Manifest size does not match RedfurSync.exe.' }
          if ($manifest.sha256 -ne $exeHash) { throw 'Manifest SHA-256 does not match RedfurSync.exe.' }
          if ($manifest.sha256 -notmatch '^[a-f0-9]{64}$') { throw 'Manifest SHA-256 is malformed.' }

          Expand-Archive RedfurSync-win-x64.zip -DestinationPath verify-zip
          $zipExe = Get-Item verify-zip/RedfurSync.exe
          $zipHash = (Get-FileHash $zipExe.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($zipExe.Length -ne $exe.Length -or $zipHash -ne $exeHash) {
            throw 'The zip does not contain the verified RedfurSync.exe.'
          }

          $fileVersion = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($exe.FullName).FileVersion
          if (-not $fileVersion.StartsWith("$($env:RELEASE_VERSION).")) {
            throw "Executable file version $fileVersion does not match release $env:RELEASE_VERSION."
          }

          $zipHashValue = (Get-FileHash RedfurSync-win-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $manifestHash = (Get-FileHash update-manifest.json -Algorithm SHA256).Hash.ToLowerInvariant()
          @(
            "$exeHash  RedfurSync.exe"
            "$zipHashValue  RedfurSync-win-x64.zip"
            "$manifestHash  update-manifest.json"
          ) | Set-Content -Path SHA256SUMS.txt -Encoding ascii

      - name: Preserve verified artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RedfurSync-${{ steps.version.outputs.version }}-win-x64
          if-no-files-found: error
          retention-days: 14
          path: |
            RedfurSync.exe
            RedfurSync-win-x64.zip
            update-manifest.json
            SHA256SUMS.txt

      - name: Create draft GitHub release
        if: steps.version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            RedfurSync.exe
            RedfurSync-win-x64.zip
            update-manifest.json
            SHA256SUMS.txt

      - name: Publish verified GitHub release
        if: steps.version.outputs.is_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit $env:GITHUB_REF_NAME --draft=false --latest